name: AI Code Review with Z.ai

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Code Review
        uses: ./
        env:
          # The codex/openai config in .github/review-agents.yml resolves its key from
          # this env var (config.endpoint.apiKeyEnv: OPENAI_API_KEY).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          ZAI_REVIEWER_NAME: ${{ vars.ZAI_REVIEWER_NAME }}
