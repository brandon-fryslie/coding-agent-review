name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Assert README inputs table matches action.yml
        # action.yml is the source of truth for the input contract; the README inputs
        # table is a derived view (and the Marketplace listing body). Fail if they drift
        # — an undocumented input or an orphan row. kx9.7 reconciled them by hand; this
        # keeps them reconciled by construction. [LAW:single-enforcer][LAW:one-source-of-truth]
        run: node scripts/check-readme-inputs.js

      - name: Build
        run: npm run build

      - name: Assert dist/ is up to date
        # Fail if the committed dist/ doesn't match a fresh build.
        # A stale dist/ means the shipped bundle doesn't reflect src/ changes.
        run: |
          if ! git diff --exit-code dist/; then
            echo "dist/ is stale — run 'npm run build' and commit dist/ alongside src/ changes"
            exit 1
          fi

      - name: Test
        run: npm test

  version-bump:
    # Enforce the version-bump rule only where there is a base to diff against:
    # a pull request. On a push to main there is no "PR base"; the rule has already
    # been enforced on the PR that produced the merge. [LAW:dataflow-not-control-flow]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the base branch and the merge base are reachable for
          # the diff in check-version-bump.sh.
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Require a version bump when the shipped surface changed
        run: scripts/check-version-bump.sh "origin/${{ github.base_ref }}"
