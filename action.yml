name: "Z.ai Coding Agent Review"
description: "AI-powered code review using Claude Code with Z.ai Coding Plan credentials"
inputs:
  ZAI_API_KEY:
    description: "Z.ai API key"
    required: true
  ZAI_MODEL:
    description: "Model passed to Claude Code"
    required: false
    default: "glm-4.7"
  ZAI_SYSTEM_PROMPT:
    description: "Additional system prompt appended to Claude Code"
    required: false
    default: "You are an expert code reviewer. Review the provided code changes and give clear, actionable feedback."
  ZAI_REVIEWER_NAME:
    description: "Name shown in the review comment header"
    required: false
    default: "Z.ai Coding Agent Review"
  EXCLUDE_PATTERNS:
    description: "Comma-separated file patterns to exclude from review (e.g. '*.lock,dist/**,*.min.js')"
    required: false
    default: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
  MAX_DIFF_CHARS:
    description: "Maximum total characters for the diff sent to the API (0 = unlimited)"
    required: false
    default: "0"
  GITHUB_TOKEN:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "check-circle"
  color: "gray-dark"
